<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsSalud - Control de Asistencia</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- VISTA 1: INICIO -->
    <section id="view-home" class="view active">
        <div class="hero-overlay">
            <div class="main-card">
                <img src="/imagenes/logo.png" alt="Logo EsSalud" class="main-logo">
                <h1 class="main-title">Gestión Metropolitano</h1>
                <p class="subtitle">Panel de Control de Seguridad</p>
                <div class="menu-grid">
                    <button class="btn-nav" onclick="showView('view-register')">Metropolitano A</button>
                    <button class="btn-nav" onclick="showView('view-register')">Metropolitano B</button>
                    <button class="btn-nav btn-accent" onclick="showView('view-register')">Registrar Asistencia</button>
                    <button class="btn-nav" onclick="showView('view-history')">Ver Historial</button>
                    <button class="btn-nav btn-danger" onclick="openModal()">Reiniciar Día</button>
                </div>
            </div>
        </div>
    </section>

    <!-- VISTA 2: REGISTRO -->
    <section id="view-register" class="view">
        <div class="top-bar">
            <button class="btn-back" onclick="showView('view-home')">
                <span class="back-arrow">&#8592;</span> Volver
            </button>
            <h2>Registro de Personal</h2>
        </div>
        <div class="content-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Buscar por nombre..." onkeyup="filterStaff()">
            </div>
            <div id="staff-list" class="staff-grid">
                <!-- Se llena con JS -->
            </div>
        </div>
    </section>

    <!-- VISTA 3: HISTORIAL -->
    <section id="view-history" class="view">
        <div class="top-bar">
            <button class="btn-back" onclick="showView('view-home')">
                <span class="back-arrow">&#8592;</span> Volver
            </button>
            <h2>Historial del Día</h2>
        </div>
        <div class="content-container">
            <div class="table-wrapper">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Personal</th>
                            <th>Cons.</th>
                            <th>Ingreso</th>
                            <th>Salida Motivo</th>
                            <th>Regreso</th>
                            <th>Salida Final</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- MODAL DE CONFIRMACIÓN -->
    <div id="modal-reset" class="modal">
        <div class="modal-box">
            <h3>¿Reiniciar registros?</h3>
            <p>Se limpiarán las horas de hoy, pero el historial se mantendrá guardado.</p>
            <div class="modal-footer">
                <button class="btn-modal-confirm" onclick="resetDay()">Confirmar</button>
                <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
